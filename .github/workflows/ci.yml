name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check src scripts tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The base classes and utilities are intentionally importable without the
      # full RAG/eval stack (lazy submodule loading), so the unit suite runs
      # against a light dependency set and stays fast.
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio tiktoken loguru
      - name: Run unit tests
        run: PYTHONPATH=. pytest tests -q
